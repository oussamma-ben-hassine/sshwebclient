name: Build & Deploy Production

on:
  push:
    branches:
      - main

# Permissions minimales:
# - contents:read pour checkout
# - packages:write pour push GHCR via GITHUB_TOKEN
permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/${{ github.repository }}

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.image.outputs.image_repo }}
      image_tag_sha: ${{ steps.meta.outputs.image_tag_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_REPO=$(echo "${IMAGE_REPO}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Expose image repo output
        id: image
        run: echo "image_repo=${{ steps.meta.outputs.image_repo }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:latest
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.image_tag_sha }}

  deploy_vps:
    runs-on: ubuntu-latest
    needs: build_and_publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote app directory exists
        run: ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}" "mkdir -p '${{ secrets.VPS_APP_PATH }}'"

      - name: Upload deployment assets
        run: |
          scp -P "${{ secrets.VPS_SSH_PORT }}" docker-compose.prod.yml "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:${{ secrets.VPS_APP_PATH }}/docker-compose.prod.yml"
          scp -P "${{ secrets.VPS_SSH_PORT }}" scripts/deploy.sh "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:${{ secrets.VPS_APP_PATH }}/deploy.sh"

      - name: Deploy on VPS
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}" \
            "chmod +x '${{ secrets.VPS_APP_PATH }}/deploy.sh' && \
             IMAGE_REPO='${{ needs.build_and_publish.outputs.image_repo }}' \
             IMAGE_TAG='${{ needs.build_and_publish.outputs.image_tag_sha }}' \
             APP_PATH='${{ secrets.VPS_APP_PATH }}' \
             GHCR_USERNAME='${{ secrets.VPS_GHCR_USERNAME }}' \
             GHCR_TOKEN='${{ secrets.VPS_GHCR_TOKEN }}' \
             '${{ secrets.VPS_APP_PATH }}/deploy.sh'"

version: '3.8'
services:
  web-ssh:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - JWT_SECRET=your_super_secret
      - ENCRYPTION_KEY=32_characters_exact_key_here_1234
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
    volumes:
      - ./data:/app/data
    restart: always

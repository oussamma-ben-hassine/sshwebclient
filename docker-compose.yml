version: '3.8'
services:
  web-ssh:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - JWT_SECRET=${JWT_SECRET:-your_super_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32_characters_exact_key_here_1234}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - JWT_SECRET=your_super_secret
      - ENCRYPTION_KEY=32_characters_exact_key_here_1234
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
    volumes:
      - ./data:/app/data
    restart: always
